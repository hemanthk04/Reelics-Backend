version: "3.9"

services:
  reelics-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: reelics-backend
    ports:
      - "8078:8078"
    env_file:
      - ../.env
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: reelics-postgres
    environment:
      POSTGRES_DB: reelics
      POSTGRES_USER: reelics
      POSTGRES_PASSWORD: reelics
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  postgres_data:
